syntax = "proto3";

import "sdk/features.mixer.proto";

package features;

message Config {
    optional features_mixer.Config mixer = 1;
}

message Request {
    oneof request {
        features_mixer.Request mixer = 1;
    }
}

message Response {
    oneof response {
        features_mixer.Response mixer = 1;
    }
}

message ServerEvent {
    oneof event {
        features_mixer.ServerEvent mixer = 1;
    }
}
